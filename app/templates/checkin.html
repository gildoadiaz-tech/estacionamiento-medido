<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In - {{ espacio.ubicacion }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">🅿️ Check-In</h1>
        <p class="text-gray-600 mb-6">{{ espacio.ubicacion }}</p>

        <form id="checkinForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">ID Conductor</label>
                <input type="number" name="conductor_id" placeholder="Ej: 1" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 mt-1">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold">
                Ingresar
            </button>
        </form>

        <div id="resultado" class="hidden mt-6 p-4 bg-green-50 rounded-xl border border-green-200">
            <p class="text-green-700 font-semibold">✅ Estacionamiento iniciado</p>
            <p id="horaInicio" class="text-sm text-gray-600 mt-1"></p>
            <div id="qrSalida" class="mt-4 text-center"></div>
            <p class="text-xs text-gray-400 mt-2">Escaneá este QR para registrar tu salida</p>
        </div>

        <a href="/" class="block text-center text-sm text-blue-600 mt-6">← Volver</a>
    </div>

    <script>
        document.getElementById("checkinForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const conductor_id = e.target.conductor_id.value;
            const espacio_id = {{ espacio.id }};

            const res = await fetch("/api/checkin", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ espacio_id, conductor_id: parseInt(conductor_id) }),
            });
            const data = await res.json();

            if (res.ok) {
                document.getElementById("resultado").classList.remove("hidden");
                document.getElementById("horaInicio").textContent = "Inicio: " + new Date(data.hora_inicio).toLocaleString();
                document.getElementById("qrSalida").innerHTML = `<img src="data:image/png;base64,${data.qr_salida}" class="mx-auto w-48 h-48">`;
            } else {
                alert("Error: " + data.detail);
            }
        });
    </script>
</body>
</html>
