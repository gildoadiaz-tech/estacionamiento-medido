<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ titulo }}</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000; color: #FFF;
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card { text-align: center; padding: 40px 24px; max-width: 360px; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        p { color: #98989F; font-size: 15px; margin-bottom: 24px; }
        a {
            display: inline-block; background: #06C167; color: #000;
            padding: 14px 32px; border-radius: 14px; font-weight: 700;
            text-decoration: none; font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">{{ icono }}</div>
        <h1>{{ titulo }}</h1>
        <p>{{ mensaje }}</p>
        <a href="/conductor">Volver al inicio</a>
    </div>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    </script>
</body>
</html>
