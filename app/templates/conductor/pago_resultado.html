<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ titulo }}</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#015cb4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
        :root {
    --primary: #015cb4;
    --primary-dark: #014a94;
    --primary-light: #e7f1ff;
    --accent: #ec0f7f;
    --bg-primary: #f5f7fa;
    --bg-card: #ffffff;
    --bg-elevated: #eef2f7;
    --text-primary: #1a1a2e;
    --text-secondary: #455a72;
    --text-tertiary: #686868;
    --border: #e0e5ec;
    --radius: 12px;
    --radius-sm: 8px;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #d97706;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary); color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .card { text-align: center; padding: 40px 24px; max-width: 360px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        p { color: var(--text-secondary); font-size: 15px; margin-bottom: 24px; }
        a {
            display: inline-block; background: var(--primary); color: #fff;
            padding: 14px 32px; border-radius: var(--radius); font-weight: 700;
            text-decoration: none; font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">{{ icono }}</div>
        <h1>{{ titulo }}</h1>
        <p>{{ mensaje }}</p>
        <a href="/conductor">Volver al inicio</a>
    </div>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    </script>
</body>
</html>
