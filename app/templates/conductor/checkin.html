<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-sm mx-auto p-4">
        <div class="flex items-center gap-3 mb-6">
            <a href="/conductor" class="text-2xl">←</a>
            <h1 class="text-xl font-bold">Escanear QR</h1>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center mb-4">
            <div class="text-6xl mb-4">📷</div>
            <p class="text-gray-600 mb-4">Escaneá el código QR del espacio donde estacionás</p>

            <div class="bg-gray-100 rounded-xl p-4 mb-4">
                <input type="text" id="qrInput" placeholder="O ingresá código manual..."
                    class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-center">
            </div>
        </div>

        <form id="checkinForm" class="space-y-3">
            <input type="hidden" id="conductorId" value="{{ conductor_id or 1 }}">
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-semibold text-lg hover:bg-blue-700 transition">
                Confirmar Entrada
            </button>
        </form>

        <div id="resultado" class="hidden mt-4 bg-green-50 rounded-2xl p-4 border border-green-200 text-center">
            <p class="text-green-700 font-bold text-lg">✅ Estacionando</p>
            <p id="horaInicio" class="text-sm text-gray-600 mt-1"></p>
            <p id="espacioInfo" class="text-sm text-gray-600"></p>
            <div id="qrSalida" class="mt-4"></div>
            <p class="text-xs text-gray-400 mt-2">Guardá este QR para escanear al retirarte</p>
        </div>
    </div>

    <script>
        document.getElementById("checkinForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const qrInput = document.getElementById("qrInput").value.trim();
            const espacioId = qrInput.match(/\d+$/)?.[0];
            if (!espacioId) return alert("Escaneá o ingresá un código QR válido");

            const conductorId = parseInt(document.getElementById("conductorId").value || 1);
            const res = await fetch("/api/checkin", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ espacio_id: parseInt(espacioId), conductor_id: conductorId }),
            });
            const data = await res.json();

            if (res.ok) {
                document.getElementById("resultado").classList.remove("hidden");
                document.getElementById("horaInicio").textContent = "Inicio: " + new Date(data.hora_inicio).toLocaleTimeString();
                document.getElementById("espacioInfo").textContent = "Espacio #" + espacioId;
                document.getElementById("qrSalida").innerHTML = `<img src="data:image/png;base64,${data.qr_salida}" class="mx-auto w-40 h-40">`;
            } else {
                alert("Error: " + (data.detail || "desconocido"));
            }
        });

        document.getElementById("qrInput").addEventListener("input", function() {
            const val = this.value.trim();
            const match = val.match(/checkout\/(\d+)/);
            if (match) {
                window.location.href = "/conductor/checkout/" + match[1];
            }
        });
    </script>
</body>
</html>
