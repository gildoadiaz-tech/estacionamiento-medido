<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial — Estacionamiento Salta</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#015cb4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --nav-height: 72px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + 16px);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .header a { color: var(--primary); text-decoration: none; font-size: 20px; font-weight: 600; }
        .header h1 { font-size: 20px; font-weight: 700; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            transition: background 0.15s;
        }
        .card.expanded { background: var(--primary-light); }
        .card .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .card .ubicacion { font-weight: 600; font-size: 15px; }
        .card .fecha { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .card .costo { font-weight: 700; font-size: 16px; color: var(--primary); }
        .card .status { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 4px; display: inline-block; }
        .card .status.pagado { background: #dcfce7; color: #16a34a; }
        .card .status.pendiente { background: #fef3c7; color: #d97706; }
        .card .status.activo { background: #dbeafe; color: #015cb4; }
        .card .details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .card.expanded .details { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
        .detail-row .label { color: var(--text-secondary); }
        .detail-row .value { font-weight: 500; }
        .btn-comprobante {
            display: inline-block; margin-top: 8px;
            background: var(--primary); color: #fff; border: none;
            border-radius: var(--radius-sm); padding: 8px 16px;
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
            -webkit-appearance: none;
        }
        .btn-comprobante:active { opacity: 0.85; }
        .total-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-top: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .total-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .total-card .amount { font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 2px; }
        .empty { text-align: center; color: var(--text-tertiary); font-size: 14px; padding: 40px 0; }
        .spinner { text-align: center; color: var(--text-tertiary); padding: 40px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/conductor">←</a>
            <h1>Historial</h1>
        </div>

        <div id="listaSesiones">
            <div class="spinner">Cargando...</div>
        </div>

        <div class="total-card">
            <div class="label">Total gastado</div>
            <div class="amount" id="totalGastado">$0</div>
        </div>
    </div>

    <nav style="position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);box-shadow:0 -2px 8px rgba(0,0,0,0.06);height:var(--nav-height);display:flex;align-items:center;justify-content:space-around;z-index:1000;padding-bottom:env(safe-area-inset-bottom,0)">
        <a href="/conductor" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-tertiary);font-size:11px;padding:6px 12px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</a>
        <a href="/conductor/buscar" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-tertiary);font-size:11px;padding:6px 12px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Buscar</a>
        <a href="/conductor/estacionar" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px"><div style="width:48px;height:48px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 4px 12px rgba(1,92,180,0.3);color:#fff;font-size:20px;font-weight:700">P</div><span style="font-size:11px;color:var(--primary);font-weight:600">Estacionar</span></a>
        <a href="/conductor/historial" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--primary);font-size:11px;font-weight:600;padding:6px 12px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Historial</a>
        <a href="/conductor/perfil" style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-tertiary);font-size:11px;padding:6px 12px"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</a>
    </nav>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }
        const CONDUCTOR_ID = parseInt(localStorage.getItem('conductor_id') || '1');

        async function api(url, opts = {}) {
            opts.headers = opts.headers || {};
            opts.headers['Authorization'] = 'Bearer ' + token;
            return fetch(url, opts);
        }

        async function cargarHistorial() {
            try {
                const res = await api('/api/conductor/historial');
                const body = await res.json();
                const sesiones = body.sesiones || body;
                const container = document.getElementById('listaSesiones');
                if (!sesiones.length) {
                    container.innerHTML = '<div class="empty">Sin estacionamientos registrados</div>';
                    return;
                }
                let total = 0;
                container.innerHTML = sesiones.map(s => {
                    if (s.costo_total) total += s.costo_total;
                    const statusClass = !s.hora_fin ? 'activo' : (s.pagado ? 'pagado' : 'pendiente');
                    const statusText = !s.hora_fin ? 'Activo' : (s.pagado ? 'Pagado' : 'Pendiente');
                    const inicio = new Date(s.hora_inicio);
                    const fin = s.hora_fin ? new Date(s.hora_fin) : null;
                    return '<div class="card" onclick="this.classList.toggle(\'expanded\')" style="cursor:pointer"><div class="top-row"><div><div class="ubicacion">' + (s.ubicacion || 'Espacio #' + s.espacio_id) + '</div><div class="fecha">' + inicio.toLocaleDateString() + ' ' + inicio.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + (fin ? ' → ' + fin.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '') + '</div></div><div style="text-align:right"><div class="costo">' + (s.costo_total ? '$' + s.costo_total : '—') + '</div><span class="status ' + statusClass + '">' + statusText + '</span></div></div><div class="details"><div class="detail-row"><span class="label">Patente</span><span class="value">' + (s.vehiculo_patente || '—') + '</span></div><div class="detail-row"><span class="label">Inicio</span><span class="value">' + inicio.toLocaleString() + '</span></div>' + (fin ? '<div class="detail-row"><span class="label">Fin</span><span class="value">' + fin.toLocaleString() + '</span></div>' : '') + '<div class="detail-row"><span class="label">Método</span><span class="value">' + (s.metodo_pago || '—') + '</span></div>' + (s.pagado ? '<button class="btn-comprobante" onclick="event.stopPropagation();verComprobante(' + s.id + ')">Comprobante PDF</button>' : '') + '</div></div>';
                }).join('');
                document.getElementById('totalGastado').textContent = '$' + total.toFixed(0);
            } catch {
                document.getElementById('listaSesiones').innerHTML = '<div class="empty">Error al cargar historial</div>';
            }
        }

        async function verComprobante(sesionId) {
            try {
                const res = await api('/api/conductor/comprobante/' + sesionId);
                const d = await res.json();
                if (!res.ok) throw new Error(d.detail || 'Error');
                const metodoPago = d.metodo_pago === 'mercadopago' ? 'Mercado Pago' : 'Efectivo';
                alert(
                    'COMPROBANTE\n' +
                    '━━━━━━━━━━━━━━━\n' +
                    'Sesión #' + d.sesion_id + '\n' +
                    'Conductor: ' + d.conductor + '\n' +
                    'Patente: ' + d.patente + ' (' + d.tipo_vehiculo + ')\n' +
                    'Ubicación: ' + d.ubicacion + '\n' +
                    'Permisionario: ' + d.permisionario + '\n' +
                    'Inicio: ' + new Date(d.hora_inicio).toLocaleString() + '\n' +
                    (d.hora_fin ? 'Fin: ' + new Date(d.hora_fin).toLocaleString() + '\n' : '') +
                    'Método: ' + metodoPago + '\n' +
                    'Estado: ' + d.estado + '\n' +
                    '━━━━━━━━━━━━━━━\n' +
                    'Total: $' + (d.costo_total || 0)
                );
            } catch { alert('Error al cargar comprobante'); }
        }

        cargarHistorial();
    </script>
    <script>navigator.serviceWorker&&navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
