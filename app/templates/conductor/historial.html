<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-sm mx-auto p-4">
        <div class="flex items-center gap-3 mb-6">
            <a href="/conductor" class="text-2xl">←</a>
            <h1 class="text-xl font-bold">Historial</h1>
        </div>

        <div class="mb-4">
            <label class="text-sm text-gray-600">Tu ID de conductor:</label>
            <input type="number" id="conductorId" value="1" class="w-full border rounded-xl px-4 py-2 mt-1">
        </div>

        <div id="listaSesiones" class="space-y-3">
            <p class="text-gray-400 text-sm text-center py-8">Cargando...</p>
        </div>
    </div>

    <script>
        async function cargarHistorial() {
            const conductorId = document.getElementById("conductorId").value;
            const res = await fetch(`/api/sesiones/conductor/${conductorId}`);
            const sesiones = await res.json();
            const container = document.getElementById("listaSesiones");

            if (sesiones.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">Sin estacionamientos registrados</p>';
                return;
            }

            container.innerHTML = sesiones.map(s => `
                <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                    <div class="flex justify-between">
                        <div>
                            <p class="font-semibold">Espacio #${s.espacio_id}</p>
                            <p class="text-xs text-gray-500">${new Date(s.hora_inicio).toLocaleString()}</p>
                            ${s.hora_fin ? `<p class="text-xs text-gray-500">→ ${new Date(s.hora_fin).toLocaleString()}</p>` : '<p class="text-xs text-blue-500">● Activo</p>'}
                        </div>
                        <div class="text-right">
                            ${s.costo_total ? `<p class="font-bold">$${s.costo_total}</p>` : ''}
                            <span class="text-xs px-2 py-1 rounded-full ${s.pagado ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${s.pagado ? 'Pagado' : 'Pendiente'}</span>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        document.getElementById("conductorId").addEventListener("change", cargarHistorial);
        cargarHistorial();
    </script>
</body>
</html>
