<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Reservas</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --uber-green: #06C167;
            --bg-primary: #000;
            --bg-card: #1C1C1E;
            --bg-elevated: #2C2C2E;
            --text-primary: #FFF;
            --text-secondary: #98989F;
            --text-tertiary: #636366;
            --border: #3A3A3C;
            --radius: 14px;
            --danger: #FF453A;
            --warning: #FF9F0A;
            --nav-height: 72px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + 16px);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .header .back { color: var(--uber-green); text-decoration: none; font-size: 20px; font-weight: 600; }
        .header .title { font-size: 20px; font-weight: 700; }

        .reserva-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
        }
        .reserva-card .top {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 6px;
        }
        .reserva-card .ubicacion { font-size: 15px; font-weight: 600; }
        .reserva-card .fechas { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .badge {
            display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px;
            border-radius: 12px; text-transform: capitalize;
        }
        .badge-pendiente { background: rgba(255,159,10,0.2); color: var(--warning); }
        .badge-aprobada { background: rgba(6,193,103,0.2); color: var(--uber-green); }
        .badge-rechazada { background: rgba(255,69,58,0.2); color: var(--danger); }

        .empty { text-align: center; color: var(--text-tertiary); font-size: 13px; padding: 48px 0; }
        .empty .icon { font-size: 48px; margin-bottom: 8px; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
            background: var(--bg-primary); border-top: 1px solid var(--border);
            display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav a {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-decoration: none; color: var(--text-secondary);
            font-size: 11px; font-weight: 500; gap: 2px; -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav a.active { color: var(--uber-green); }
        .bottom-nav a .nav-icon { font-size: 22px; line-height: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/conductor" class="back">←</a>
            <h1 class="title">Mis Reservas</h1>
        </div>

        <div id="listaReservas">
            <p style="text-align:center;color:var(--text-tertiary);font-size:13px;padding:24px">Cargando…</p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="/conductor">
            <span class="nav-icon">🏠</span>
            <span>Inicio</span>
        </a>
        <a href="/conductor/mapa">
            <span class="nav-icon">🗺️</span>
            <span>Mapa</span>
        </a>
        <a href="/conductor/mis-reservas" class="active">
            <span class="nav-icon">📋</span>
            <span>Reservas</span>
        </a>
        <a href="/conductor/perfil">
            <span class="nav-icon">👤</span>
            <span>Perfil</span>
        </a>
    </nav>

    <script>
        const CONDUCTOR_ID = parseInt(localStorage.getItem('conductor_id') || '1');

        async function cargarReservas() {
            const res = await fetch(`/api/reservas/conductor/${CONDUCTOR_ID}`);
            const reservas = await res.json();
            const cont = document.getElementById('listaReservas');

            if (!reservas.length) {
                cont.innerHTML = '<div class="empty"><div class="icon">📋</div>No tenés reservas</div>';
                return;
            }

            cont.innerHTML = reservas.map(r => `
                <div class="reserva-card">
                    <div class="top">
                        <div>
                            <p class="ubicacion">${r.ubicacion || 'Espacio #' + r.espacio_id}</p>
                            <p class="fechas">${new Date(r.hora_inicio).toLocaleString()} → ${new Date(r.hora_fin).toLocaleString()}</p>
                        </div>
                        <span class="badge badge-${r.estado}">${r.estado}</span>
                    </div>
                </div>
            `).join('');
        }

        cargarReservas();
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    </script>
</body>
</html>
