<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa - Estacionamiento Salta</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #mapa { height: 70vh; width: 100%; border-radius: 1rem; z-index: 0; }
        .leaflet-popup-content { margin: 8px; font-size: 13px; }
        .ubicarme-btn { position: absolute; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-lg mx-auto p-3">
        <div class="flex items-center gap-2 mb-3">
            <a href="/conductor" class="text-xl">←</a>
            <h1 class="text-lg font-bold flex-1">Mapa de Estacionamiento</h1>
            <span id="contador" class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">0 libres</span>
        </div>

        <div id="mapa"></div>

        <div class="flex gap-2 mt-3">
            <button id="btnBuscar" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold text-sm hover:bg-blue-700 transition">
                📍 Dónde estacionar
            </button>
            <button id="btnRecargar" class="bg-white border border-gray-300 text-gray-700 px-4 py-3 rounded-xl text-sm hover:bg-gray-50 transition">
                ↻
            </button>
        </div>

        <div id="resultados" class="mt-3 hidden">
            <div class="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
                <p class="text-xs text-gray-500 font-semibold uppercase mb-2">MÁS CERCANOS</p>
                <div id="listaCercanos"></div>
            </div>
        </div>

        <div class="flex gap-3 mt-3 text-xs text-gray-500 justify-center">
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span> Estacionamiento medido</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> Prohibido estacionar</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-500 inline-block"></span> Ocupado</span>
        </div>
    </div>

    <script>
        const callesData = {{ calles_json|safe }};
        const espaciosVirtuales = {{ espacios_json|safe }};
        const sesionesActivas = {{ sesiones_json|safe }};

        const map = L.map('mapa').setView([-24.7883, -65.4106], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 19,
        }).addTo(map);

        const iconoLibre = L.divIcon({ html: '🅿️', iconSize: [24, 24], className: '' });
        const iconoOcupado = L.divIcon({ html: '🔴', iconSize: [24, 24], className: '' });

        const coloresCalles = {
            estacionamiento_medido: { color: '#22c55e', weight: 5, opacity: 0.7 },
            prohibido_estacionar: { color: '#ef4444', weight: 4, opacity: 0.6 },
            carga_descarga: { color: '#f59e0b', weight: 4, opacity: 0.6 },
            peatonal: { color: '#8b5cf6', weight: 3, opacity: 0.5, dashArray: '5,5' },
        };

        const ocupadosSet = new Set(sesionesActivas.map(s => `${s.espacio_id}`));

        callesData.forEach(c => {
            const style = coloresCalles[c.tipo] || { color: '#6b7280', weight: 3 };
            L.polyline(c.puntos, style).addTo(map)
                .bindPopup(`<b>${c.nombre}</b><br>${c.tipo === 'estacionamiento_medido' ? '✅ Estacionamiento medido · $' + c.tarifa + '/h' : c.tipo === 'prohibido_estacionar' ? '❌ Prohibido estacionar' : c.tipo}`);
        });

        let marcadores = [];
        function mostrarEspacios() {
            marcadores.forEach(m => map.removeLayer(m));
            marcadores = [];

            espaciosVirtuales.forEach(e => {
                const ocupado = Math.random() < 0.3 || ocupadosSet.has(`${e.id}`);
                if (e.tipo !== 'estacionamiento_medido') return;

                const color = ocupado ? '#ef4444' : '#22c55e';
                const marker = L.circleMarker([e.lat, e.lng], {
                    radius: 5, color, fillColor: color, fillOpacity: 0.8, weight: 1,
                }).addTo(map);

                if (!ocupado) {
                    marker.bindPopup(`
                        <b>${e.calle}</b><br>
                        $${e.tarifa}/hora · Libre<br>
                        <a href="/conductor/checkin" class="text-blue-600 text-xs">🅿️ Estacionar aquí</a>
                    `);
                }
                marcadores.push(marker);
            });

            const libres = espaciosVirtuales.filter(e => e.tipo === 'estacionamiento_medido').length;
            document.getElementById('contador').textContent = libres + ' libres';
        }
        mostrarEspacios();

        let ubicacionUsuario = null;
        let circuloRadio = null;

        document.getElementById('btnBuscar').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización');
                return;
            }
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                ubicacionUsuario = [lat, lng];

                if (circuloRadio) map.removeLayer(circuloRadio);
                circuloRadio = L.circle(ubicacionUsuario, {
                    radius: 300, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 0.08, weight: 2,
                }).addTo(map);

                L.marker(ubicacionUsuario, {
                    icon: L.divIcon({ html: '📍', iconSize: [24, 24], className: '' })
                }).addTo(map).bindPopup('Vos');

                map.setView(ubicacionUsuario, 16);

                const cercanos = espaciosVirtuales
                    .filter(e => e.tipo === 'estacionamiento_medido')
                    .map(e => ({
                        ...e,
                        distancia: Math.sqrt(
                            Math.pow(e.lat - lat, 2) + Math.pow(e.lng - lng, 2)
                        ) * 111320
                    }))
                    .filter(e => e.distancia < 300)
                    .sort((a, b) => a.distancia - b.distancia)
                    .slice(0, 10);

                const cont = document.getElementById('listaCercanos');
                const resDiv = document.getElementById('resultados');

                if (cercanos.length === 0) {
                    cont.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">No hay espacios libres cerca</p>';
                } else {
                    cont.innerHTML = cercanos.map(e => `
                        <div class="flex justify-between items-center py-2 border-b last:border-0">
                            <div>
                                <p class="font-medium text-sm">${e.calle}</p>
                                <p class="text-xs text-gray-500">$${e.tarifa}/h · ${Math.round(e.distancia)}m</p>
                            </div>
                            <a href="/conductor/checkin" class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full">🅿️ Ir</a>
                        </div>
                    `).join("");
                }
                resDiv.classList.remove('hidden');
            }, () => {
                alert('No se pudo obtener tu ubicación. Activá el GPS.');
            }, { enableHighAccuracy: true });
        });

        document.getElementById('btnRecargar').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
