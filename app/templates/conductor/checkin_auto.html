<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in — Conductor</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1C1C1E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 12px; }
        .title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .sub { font-size: 14px; color: #98989F; margin-bottom: 20px; }
        .calle { font-size: 16px; color: #06C167; font-weight: 600; margin-bottom: 4px; }
        .precio { font-size: 13px; color: #98989F; margin-bottom: 20px; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #3A3A3C;
            border-top-color: #06C167;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #FF453A; font-size: 14px; margin-top: 12px; display: none; }
        .btn {
            display: inline-block;
            background: #06C167;
            color: #000;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            margin-top: 16px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .qr-img { width: 140px; height: 140px; margin: 12px auto 0; display: none; }
        .success { display: none; }
        .success.show { display: block; }
        .loading.show { display: block; }
        .loading { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚗</div>
        <div class="title">Escaneaste un QR de estacionamiento</div>
        <div class="calle" id="calle">{{ perm.nombre }} — {{ perm.calle }}</div>
        <div class="precio">Cuadra: {{ perm.calle }}</div>

        <div id="loading" class="loading show">
            <div class="spinner"></div>
            <p>Registrando entrada…</p>
        </div>

        <div id="error" class="error"></div>
    </div>

    <script>
        const PERM_ID = {{ perm.id }};
        const CONDUCTOR_ID = parseInt(localStorage.getItem('conductor_id') || '1');

        (async () => {
            try {
                const res = await fetch('/api/checkin-por-perm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ permisionario_id: PERM_ID, conductor_id: CONDUCTOR_ID }),
                });
                const data = await res.json();
                if (res.ok) {
                    // Redirect to checkout page to configure hours and payment
                    window.location.href = '/conductor/checkout/' + data.sesion_id;
                } else {
                    throw new Error(data.detail || 'Error al registrar entrada');
                }
            } catch (e) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '❌ ' + e.message;
            }
        })();
    </script>
</body>
</html>
