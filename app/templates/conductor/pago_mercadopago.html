<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercado Pago — Pago simulado</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#009ee3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mp-blue: #009ee3;
            --mp-blue-dark: #0077b3;
            --mp-bg: #f5f5f5;
            --mp-card: #ffffff;
            --mp-text: #333333;
            --mp-text-secondary: #666666;
            --mp-success: #00a650;
            --mp-border: #e0e0e0;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--mp-bg);
            font-family: 'Manrope', system-ui, sans-serif;
            color: var(--mp-text);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 400px; width: 100%; padding: 16px; }
        .card {
            background: var(--mp-card);
            border-radius: var(--radius);
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            border: 1px solid var(--mp-border);
        }
        .mp-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .mp-logo svg { width: 32px; height: 32px; }
        .mp-logo span {
            font-size: 20px;
            font-weight: 700;
            color: var(--mp-blue);
        }
        .amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--mp-text);
            margin-bottom: 4px;
        }
        .amount-label {
            font-size: 14px;
            color: var(--mp-text-secondary);
            margin-bottom: 24px;
        }
        .qr-container {
            background: #fff;
            border: 2px solid var(--mp-border);
            border-radius: 12px;
            padding: 16px;
            margin: 0 auto 20px;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(21, 1fr);
            grid-template-rows: repeat(21, 1fr);
            gap: 2px;
            width: 180px;
            height: 180px;
        }
        .qr-cell { border-radius: 1px; }
        .qr-cell.filled { background: #111; }
        .qr-cell.empty { background: #fff; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px solid var(--mp-border);
            font-size: 14px;
        }
        .info-row .label { color: var(--mp-text-secondary); }
        .info-row .value { font-weight: 600; }
        .btn-pagar {
            width: 100%;
            background: var(--mp-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
            -webkit-appearance: none;
        }
        .btn-pagar:hover { background: var(--mp-blue-dark); }
        .btn-pagar:disabled { opacity: 0.5; cursor: default; }
        .btn-pagar.processing { background: var(--mp-text-secondary); }
        .success-box {
            display: none;
            padding: 20px;
            text-align: center;
        }
        .success-box.show { display: block; }
        .success-icon {
            width: 64px;
            height: 64px;
            background: var(--mp-success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: #fff;
            font-size: 32px;
        }
        .success-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .success-text {
            font-size: 14px;
            color: var(--mp-text-secondary);
            margin-bottom: 20px;
        }
        .btn-volver {
            display: inline-block;
            background: var(--mp-blue);
            color: #fff;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            font-size: 15px;
        }
        .sim-badge {
            background: #fff3cd;
            color: #856404;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="paymentCard">
            <div class="mp-logo">
                <svg viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="2" width="20" height="20" rx="4" fill="#009ee3"/>
                    <path d="M7 8h10M7 12h10M7 16h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Mercado Pago</span>
            </div>

            <div class="sim-badge">⚡ Simulación</div>

            <div class="amount" id="amountDisplay">${{ costo }}</div>
            <div class="amount-label">Estacionamiento {{ ubicacion }}</div>

            <div class="qr-container" id="qrContainer">
                <div class="qr-grid" id="qrGrid"></div>
            </div>

            <p style="font-size:13px;color:var(--mp-text-secondary);margin-bottom:8px">
                Escaneá con la app de Mercado Pago<br>o hacé clic en pagar
            </p>

            <div class="info-row">
                <span class="label">Patente</span>
                <span class="value">{{ patente }}</span>
            </div>
            <div class="info-row">
                <span class="label">Sesión</span>
                <span class="value">#{{ sesion_id }}</span>
            </div>

            <button class="btn-pagar" id="btnPagar" onclick="pagar()">Pagar ${{ costo }}</button>

            <div id="successBox" class="success-box">
                <div class="success-icon">✓</div>
                <div class="success-title">Pago simulado</div>
                <div class="success-text">El pago de ${{ costo }} fue procesado correctamente.</div>
                <a href="/conductor" class="btn-volver">Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        const SESION_ID = {{ sesion_id }};
        const token = localStorage.getItem('token');

        function generateQR() {
            const grid = document.getElementById('qrGrid');
            const cells = [];
            const seed = SESION_ID * 2654435761;
            for (let i = 0; i < 441; i++) {
                const hash = (seed * (i + 1)) ^ ((i * 2654435761) >>> 0);
                cells.push(hash % 3 !== 0);
            }
            grid.innerHTML = cells.map((f, i) =>
                `<div class="qr-cell ${f ? 'filled' : 'empty'}"></div>`
            ).join('');
        }

        async function pagar() {
            const btn = document.getElementById('btnPagar');
            btn.disabled = true;
            btn.textContent = 'Procesando...';
            btn.classList.add('processing');

            try {
                const res = await fetch(`/api/conductor/pago-mercadopago/${SESION_ID}/confirmar`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Error');

                btn.style.display = 'none';
                document.getElementById('qrContainer').style.display = 'none';
                document.querySelector('.sim-badge').style.display = 'none';
                document.querySelector('.amount-label').style.display = 'none';
                document.querySelector('p').style.display = 'none';
                document.querySelectorAll('.info-row').forEach(r => r.style.display = 'none');
                document.getElementById('amountDisplay').style.display = 'none';
                document.getElementById('successBox').classList.add('show');
            } catch (e) {
                alert('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Pagar ${{ costo }}';
                btn.classList.remove('processing');
            }
        }

        generateQR();
    </script>
</body>
</html>
