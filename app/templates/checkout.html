<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-Out</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">🏁 Check-Out</h1>
        <p class="text-gray-600 mb-6">{{ espacio.ubicacion }}</p>

        <button id="btnCheckout" class="w-full bg-red-600 text-white py-3 rounded-xl hover:bg-red-700 transition font-semibold">
            Finalizar Estacionamiento
        </button>

        <div id="resultado" class="hidden mt-6 space-y-4">
            <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-200">
                <p class="text-lg font-bold text-gray-800" id="costoTotal"></p>
                <p class="text-sm text-gray-600" id="horas"></p>
            </div>
            <a id="linkPago" target="_blank" class="block w-full bg-green-600 text-white text-center py-3 rounded-xl hover:bg-green-700 transition font-semibold">
                💳 Pagar con Mercado Pago
            </a>
        </div>

        <a href="/" class="block text-center text-sm text-blue-600 mt-6">← Volver</a>
    </div>

    <script>
        document.getElementById("btnCheckout").addEventListener("click", async () => {
            const res = await fetch("/api/checkout", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ sesion_id: {{ sesion.id }} }),
            });
            const data = await res.json();

            if (res.ok) {
                document.getElementById("resultado").classList.remove("hidden");
                document.getElementById("costoTotal").textContent = "💰 Total: $" + data.costo_total;
                document.getElementById("horas").textContent = "⏱ " + data.horas + " horas";
                document.getElementById("linkPago").href = data.link_pago;
            } else {
                alert("Error: " + data.detail);
            }
        });
    </script>
</body>
</html>
