<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Conductores</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
        <div class="flex items-center gap-3 mb-6">
            <a href="/admin" class="text-2xl">←</a>
            <h1 class="text-2xl font-bold">Conductores</h1>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6">
            <h2 class="font-semibold mb-4">Nuevo Conductor</h2>
            <form id="formCond" class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input name="nombre" placeholder="Nombre" required class="border rounded-xl px-4 py-2">
                <input name="email" type="email" placeholder="Email" required class="border rounded-xl px-4 py-2">
                <input name="telefono" placeholder="Teléfono" class="border rounded-xl px-4 py-2">
                <button type="submit" class="md:col-span-3 bg-blue-600 text-white py-2 rounded-xl hover:bg-blue-700">Crear</button>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="text-left p-4">ID</th>
                        <th class="text-left p-4">Nombre</th>
                        <th class="text-left p-4">Email</th>
                        <th class="text-left p-4">Teléfono</th>
                    </tr>
                </thead>
                <tbody id="tablaConductores"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById("formCond").addEventListener("submit", async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            await fetch("/api/conductores", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(Object.fromEntries(fd)),
            });
            e.target.reset();
            cargar();
        });

        async function cargar() {
            const res = await fetch("/api/conductores");
            const data = await res.json();
            document.getElementById("tablaConductores").innerHTML = data.map(c => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-mono">${c.id}</td>
                    <td class="p-4">${c.nombre}</td>
                    <td class="p-4">${c.email}</td>
                    <td class="p-4">${c.telefono || '-'}</td>
                </tr>
            `).join("");
        }
        cargar();
    </script>
</body>
</html>
