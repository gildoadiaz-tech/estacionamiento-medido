<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Permisionarios</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#015cb4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #015cb4;
            --primary-light: #e7f1ff;
            --primary-dark: #014a94;
            --accent: #ec0f7f;
            --bg: #f5f7fa;
            --card: #ffffff;
            --border: #e0e5ec;
            --text: #1a1a2e;
            --text-muted: #686868;
            --radius: 16px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #4da3e0;
                --primary-light: #152238;
                --primary-dark: #93c5fd;
                --accent: #f472b6;
                --bg: #0A1628;
                --card: #152238;
                --border: #233352;
                --text: #F0F4FF;
                --text-muted: #8B9DC3;
            }
        }
        body { background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,sans-serif; margin:0; }
        .sidebar-link { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; color:var(--text-muted); text-decoration:none; font-size:.9rem; font-weight:500; transition:all .15s; }
        .sidebar-link:hover,.sidebar-link.active { background:var(--primary-light); color:var(--primary); }
        table { width:100%; border-collapse:collapse; font-size:.875rem; }
        th { background:var(--bg); padding:12px 16px; text-align:left; font-weight:600; color:var(--text-muted); border-bottom:1px solid var(--border); }
        td { padding:12px 16px; border-bottom:1px solid var(--border); color:var(--text); }
        tr:hover td { background:var(--primary-light); }
        .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.75rem; font-weight:600; }
        .badge-green { background:#bbf7d0; color:#166534; }
        .badge-red { background:#fecaca; color:#991b1b; }
        .badge-yellow { background:#fef3c7; color:#92400e; }
        .btn { padding:10px 20px; border-radius:10px; font-weight:600; font-size:.9rem; cursor:pointer; border:none; transition:all .15s; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:hover { filter:brightness(1.1); }
        .btn-secondary { background:var(--bg); color:var(--text); border:1px solid var(--border); }
        .btn-sm { padding:4px 10px; font-size:.75rem; border-radius:8px; cursor:pointer; border:none; font-weight:600; transition:all .15s; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.4); z-index:1000; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:480px; }
        .modal-box h3 { font-family:'Montserrat',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:16px; }
        .modal-input { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-size:.9rem; font-family:inherit; background:var(--bg); color:var(--text); outline:none; margin-bottom:12px; }
        .modal-input:focus { border-color:var(--primary); }
    </style>
</head>
<body>
    <div style="display:flex;min-height:100vh;background:var(--bg);">
        <aside style="width:260px;background:var(--card);border-right:1px solid var(--border);padding:20px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 4px;">
                <div style="width:36px;height:36px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.1rem;">P</div>
                <div>
                    <div style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:.95rem;">Estacionamiento</div>
                    <div style="font-size:.7rem;color:var(--text-muted);">Admin v2.0</div>
                </div>
            </div>
            <nav style="display:flex;flex-direction:column;gap:2px;">
                <a href="/admin" class="sidebar-link">&#128202; Dashboard</a>
                <a href="/admin/conductores" class="sidebar-link">&#128663; Conductores</a>
                <a href="/admin/permisionarios" class="sidebar-link active">&#128100; Permisionarios</a>
                <a href="/admin/gestores" class="sidebar-link">&#128101; Gestores</a>
                <a href="/admin/espacios" class="sidebar-link">&#128205; Espacios</a>
                <a href="/admin/sesiones-vivo" class="sidebar-link">&#127759; Sesiones vivo</a>
                <a href="/admin/reportes" class="sidebar-link">&#128200; Reportes</a>
                <a href="/admin/deudas" class="sidebar-link">&#128176; Deudas</a>
                <div style="border-top:1px solid var(--border);margin:12px 0;"></div>
                <a href="#" onclick="localStorage.removeItem('token');window.location='/login';return false;" class="sidebar-link" style="color:#dc2626;">&#128682; Cerrar sesi&oacute;n</a>
            </nav>
        </aside>
        <main style="flex:1;padding:24px;margin-left:260px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                <div>
                    <h1 style="font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:700;margin:0;">Permisionarios</h1>
                    <p style="color:var(--text-muted);font-size:.85rem;margin:4px 0 0;">Gesti&oacute;n de permisionarios y manos asignadas</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ Nuevo Permisionario</button>
            </div>

            <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>C&oacute;digo</th>
                                <th>Nombre</th>
                                <th>DNI</th>
                                <th>CVU</th>
                                <th>Manos</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPermisionarios"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalPermisionario">
        <div class="modal-box">
            <h3 id="modalTitle">Crear Permisionario</h3>
            <form id="formPerm" onsubmit="guardarPermisionario(event)">
                <input type="hidden" id="permId" name="id" value="">
                <input name="nombre" placeholder="Nombre completo" required class="modal-input">
                <input name="email" type="email" placeholder="Email" required class="modal-input">
                <input name="dni" placeholder="DNI" required class="modal-input">
                <input name="telefono" placeholder="Tel&eacute;fono" class="modal-input">
                <input name="cvu" placeholder="CVU/CBU (para cobro MP)" class="modal-input" style="font-family:monospace;">
                <input name="calle" placeholder="Calle asignada" required class="modal-input">
                <input name="manos" type="number" placeholder="Cantidad de manos" min="1" value="1" class="modal-input">
                <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        let permCache = [];

        function openModal(id) {
            document.getElementById('permId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Editar Permisionario' : 'Crear Permisionario';
            document.getElementById('formPerm').reset();
            if (id) {
                const p = permCache.find(x => x.id === id);
                if (p) {
                    document.querySelector('#formPerm [name="nombre"]').value = p.nombre || '';
                    document.querySelector('#formPerm [name="email"]').value = p.email || '';
                    document.querySelector('#formPerm [name="dni"]').value = p.dni || '';
                    document.querySelector('#formPerm [name="telefono"]').value = p.telefono || '';
                    document.querySelector('#formPerm [name="cvu"]').value = p.cvu || '';
                }
            }
            document.getElementById('modalPermisionario').classList.add('show');
        }
        function closeModal() { document.getElementById('modalPermisionario').classList.remove('show'); }

        async function guardarPermisionario(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            data.manos = parseInt(data.manos) || 1;
            const id = data.id;
            delete data.id;
            const url = id ? '/api/admin/permisionarios/' + id : '/api/permisionarios';
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(data)
            });
            if (res.ok) { e.target.reset(); closeModal(); cargar(); alert(id ? 'Permisionario actualizado' : 'Permisionario creado'); }
            else { alert('Error al guardar permisionario'); }
        }

        async function toggleActivo(id, activo) {
            const res = await fetch('/api/admin/permisionarios/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ activo: !activo })
            });
            if (res.ok) { cargar(); }
            else { alert('Error al cambiar estado'); }
        }

        async function eliminarPermisionario(id) {
            if (!confirm('\u00bfEliminar permisionario #' + id + '?')) return;
            const res = await fetch('/api/admin/permisionarios/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) { cargar(); }
            else { alert('Error al eliminar'); }
        }

        async function cargar() {
            try {
                const res = await fetch('/api/permisionarios', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const permisionarios = Array.isArray(data) ? data : [];
                permCache = permisionarios;
                document.getElementById('tablaPermisionarios').innerHTML = permisionarios.length === 0
                    ? '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:24px;">No hay permisionarios</td></tr>'
                    : permisionarios.map(p => `<tr>
                        <td style="font-family:monospace;">${p.codigo || 'PER-' + String(p.id).padStart(4, '0')}</td>
                        <td>${p.nombre}</td>
                        <td>${p.dni || '-'}</td>
                        <td style="font-family:monospace;font-size:.8rem;">${p.cvu || '<span style="color:var(--text-muted)">—</span>'}</td>
                        <td>${p.manos || p.cantidad_manos || 1}</td>
                        <td>${p.activo !== false ? '<span class="badge badge-green">Activo</span>' : '<span class="badge badge-red">Inactivo</span>'}</td>
                        <td>
                            <button onclick="openModal(${p.id})" class="btn-sm" style="background:var(--primary);color:#fff;margin-right:4px;">Editar</button>
                            <button onclick="toggleActivo(${p.id}, ${p.activo !== false})" class="btn-sm" style="background:${p.activo !== false ? '#dc2626' : '#16a34a'};color:#fff;margin-right:4px;">${p.activo !== false ? 'Desactivar' : 'Activar'}</button>
                            <button onclick="eliminarPermisionario(${p.id})" class="btn-sm" style="background:#dc2626;color:#fff;">Eliminar</button>
                        </td>
                    </tr>`).join('');
            } catch {
                document.getElementById('tablaPermisionarios').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">Error al cargar datos</td></tr>';
            }
        }

        cargar();
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
    </script>
</body>
</html>
