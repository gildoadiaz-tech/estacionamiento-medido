<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reservas - {{ permisionario.nombre }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-sm mx-auto p-4">
        <div class="flex items-center gap-3 mb-6">
            <a href="/permisionario/{{ permisionario.id }}/panel" class="text-2xl">←</a>
            <h1 class="text-xl font-bold">Reservas Pendientes</h1>
        </div>

        <div id="listaReservas" class="space-y-3">
            <p class="text-gray-400 text-sm text-center py-8">Cargando...</p>
        </div>

        <h2 class="font-semibold text-gray-700 mt-6 mb-3">Historial de Reservas</h2>
        <div id="historialReservas" class="space-y-3">
            <p class="text-gray-400 text-sm text-center py-4">Cargando...</p>
        </div>
    </div>

    <script>
        async function cargar() {
            const permId = {{ permisionario.id }};

            const res = await fetch(`/api/reservas/pendientes/${permId}`);
            const reservas = await res.json();
            const container = document.getElementById("listaReservas");

            if (reservas.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm">✅ No hay reservas pendientes</div>';
            } else {
                container.innerHTML = reservas.map(r => `
                    <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="font-semibold">Reserva #${r.id}</p>
                                <p class="text-xs text-gray-500">Espacio #${r.espacio_id} · Conductor #${r.conductor_id}</p>
                                <p class="text-xs text-gray-400">${new Date(r.hora_inicio).toLocaleString()} → ${new Date(r.hora_fin).toLocaleString()}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="aprobar(${r.id}, true)" class="flex-1 bg-green-600 text-white py-2 rounded-xl text-sm font-medium hover:bg-green-700">✅ Aprobar</button>
                            <button onclick="aprobar(${r.id}, false)" class="flex-1 bg-red-600 text-white py-2 rounded-xl text-sm font-medium hover:bg-red-700">❌ Rechazar</button>
                        </div>
                    </div>
                `).join("");
            }

            const res2 = await fetch(`/api/reservas/permisionario/${permId}`);
            const historial = await res2.json();
            const histContainer = document.getElementById("historialReservas");
            if (historial.length === 0) {
                histContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Sin historial</p>';
            } else {
                const estadoColors = { aprobada: "bg-green-100 text-green-700", rechazada: "bg-red-100 text-red-700" };
                histContainer.innerHTML = historial.filter(r => r.estado !== 'pendiente').map(r => `
                    <div class="bg-white rounded-2xl p-3 border border-gray-100 shadow-sm text-sm">
                        <div class="flex justify-between">
                            <span>Reserva #${r.id} · Espacio #${r.espacio_id}</span>
                            <span class="text-xs px-2 py-1 rounded-full ${estadoColors[r.estado] || ''}">${r.estado}</span>
                        </div>
                    </div>
                `).join("");
            }
        }

        async function aprobar(id, ok) {
            await fetch("/api/reservas/aprobar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ reserva_id: id, aprobar: ok }),
            });
            cargar();
        }

        cargar();
    </script>
</body>
</html>
