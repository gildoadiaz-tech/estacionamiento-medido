<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reservas — Estacionamiento Salta</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#015cb4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-light: #e7f1ff;
            --primary-dark: #014a94;
            --accent: #ec0f7f;
            --bg: #f5f7fa;
            --card: #ffffff;
            --border: #e0e5ec;
            --text: #1a1a2e;
            --text-muted: #686868;
            --radius: 16px;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Manrope', system-ui, -apple-system, sans-serif; }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .header a { color: var(--primary); text-decoration: none; font-size: 22px; }
        .header h1 { font-size: 20px; font-weight: 700; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; text-align: center; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 8px; }
        .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .empty-state .desc { font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/permisionario/panel">←</a>
            <h1>Reservas</h1>
        </div>
        <div class="card empty-state">
            <div class="icon">📅</div>
            <div class="title">Sin reservas pendientes</div>
            <div class="desc">Las reservas aparecerán aquí cuando los conductores las soliciten</div>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
