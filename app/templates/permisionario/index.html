<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permisionario — Iniciar sesión</title>
    <meta name="theme-color" content="#015cb4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100dvh;
            background: var(--bg-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 24px 20px;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .brand-icon svg { width: 32px; height: 32px; }
        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .brand p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-card);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .form-group input::placeholder {
            color: var(--text-tertiary);
        }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-appearance: none;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: var(--danger);
            font-size: 13px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .helper-text {
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                </svg>
            </div>
            <h1>Permisionario</h1>
            <p>Estacionamiento Medido — Municipalidad de Salta</p>
        </div>

        <div class="card">
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" name="username" placeholder="PER12345678" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Iniciar sesión</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/">← Volver al inicio</a>
        </div>
        <p class="helper-text">Ingresá tu código PER + DNI y tu contraseña</p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const codigo = document.getElementById('codigo').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errMsg = document.getElementById('errorMsg');

            if (!codigo || !password) {
                errMsg.textContent = 'Completá todos los campos';
                errMsg.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Ingresando…';
            errMsg.classList.remove('show');

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: codigo, password: password })
            })
            .then(r => r.json().then(data => ({ ok: r.ok, status: r.status, data })))
            .then(({ ok, status, data }) => {
                if (!ok) {
                    throw new Error(data.detail || 'Credenciales incorrectas');
                }
                if (data.role !== 'permisionario') {
                    throw new Error('Esta cuenta no es de permisionario');
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_nombre', data.nombre || '');
                window.location.href = '/permisionario/panel';
            })
            .catch(err => {
                errMsg.textContent = err.message;
                errMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            });
        }

        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (token && role === 'permisionario') {
            fetch('/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => { if (r.ok) window.location.href = '/permisionario/panel'; })
            .catch(() => {});
        }
    </script>
</body>
</html>
