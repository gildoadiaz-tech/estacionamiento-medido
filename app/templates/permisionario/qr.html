<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis QR — Permisionario</title>
    <meta name="theme-color" content="#015cb4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --nav-height: 64px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + 24px);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header .title { font-size: 20px; font-weight: 700; }

        .mano-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            text-align: center;
        }
        .mano-card .mano-info {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .mano-card .mano-lado {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .mano-card .qr-wrap {
            background: #fff;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .mano-card .qr-wrap img {
            width: 180px;
            height: 180px;
            display: block;
        }
        .mano-card .qr-hint {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .empty {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 14px;
            padding: 40px 20px;
        }
        .loading { text-align: center; padding: 40px; color: var(--text-tertiary); }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid var(--border);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 600;
            padding: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav a.active { color: var(--primary); }

        .print-btn {
            display: block; width: 100%; padding: 14px; border: none;
            border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
            color: #fff; background: var(--primary); cursor: pointer;
            margin-bottom: 16px; text-align: center;
        }
        .print-btn:hover { background: var(--primary-dark); }

        @media print {
            .bottom-nav, .print-btn, .header { display: none !important; }
            body { background: #fff; padding: 0; }
            .container { max-width: 100%; padding: 8px; }
            .mano-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
            .mano-card .qr-wrap img { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Mis QR</h1>
        <button class="print-btn" onclick="window.print()">🖨 Imprimir QR para pegar en los espacios</button>
        </div>
        <div id="qrContainer" class="loading">
            <p>Cargando…</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/permisionario/panel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Panel
        </a>
        <a href="/permisionario/qr" class="active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><polyline points="14 14 17 14 17 17 21 17 21 21 14 21"/></svg>
            Mis QR
        </a>
        <a href="/permisionario/cuadra">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Cuadra
        </a>
        <a href="/permisionario/ingreso">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ingreso
        </a>
        <a href="/permisionario/salida">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salida
        </a>
    </nav>

    <script>
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'permisionario') {
            window.location.href = '/permisionario';
        }

        async function loadQRs() {
            try {
                const res = await fetch('/api/permisionario/qr-data', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { window.location.href = '/permisionario'; return; }
                const data = await res.json();

                const container = document.getElementById('qrContainer');

                if (!data.manos || data.manos.length === 0) {
                    const generalQR = `
                        <div class="mano-card">
                            <p class="mano-info">${data.nombre || 'Permisionario'}</p>
                            <p class="mano-lado">QR General</p>
                            <div class="qr-wrap">
                                <img src="data:image/png;base64,${data.qr_base64}" alt="QR">
                            </div>
                            <p class="qr-hint">Los conductores escanean este código para estacionar</p>
                        </div>
                    `;
                    container.innerHTML = generalQR;
                } else {
                    container.innerHTML = data.manos.map(mano => {
                        const qrPayload = JSON.stringify({
                            permisionario_id: data.permisionario_id,
                            mano_id: mano.id,
                            calle: mano.calle,
                            lado: mano.lado
                        });
                        const altText = mano.calle + ' - ' + (mano.lado === 'par' ? 'Lado par' : 'Lado impar');
                        return `
                            <div class="mano-card">
                                <p class="mano-info">${mano.calle}</p>
                                <p class="mano-lado">Lado ${mano.lado === 'par' ? 'par' : 'impar'} · ${mano.altura_desde ? mano.altura_desde + '-' + mano.altura_hasta : ''}</p>
                                <div class="qr-wrap">
                                    <img src="data:image/png;base64,${data.qr_base64}" alt="QR ${altText}">
                                </div>
                                <p class="qr-hint">Escaneá para estacionar en ${mano.calle}, lado ${mano.lado === 'par' ? 'par' : 'impar'}</p>
                                <a href="data:image/png;base64,${data.qr_base64}" download="qr_${mano.calle.replace(/\s+/g,'_').toLowerCase()}.png" style="display:inline-block;margin-top:8px;font-size:13px;color:var(--primary);font-weight:600;text-decoration:none;">📥 Descargar QR</a>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                document.getElementById('qrContainer').innerHTML = '<p class="empty">Error al cargar QR</p>';
            }
        }

        loadQRs();
    </script>
</body>
</html>
