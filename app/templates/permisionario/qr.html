<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR - {{ permisionario.nombre }}</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#059669">
    <style>
        :root {
            --primary: #059669;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
        }
        body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #34d399;
                --bg: #0f172a;
                --card: #1e293b;
                --border: #334155;
                --text: #e2e8f0;
                --text-muted: #94a3b8;
            }
        }
        .container { max-width: 400px; margin: 0 auto; padding: 16px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; }
        .qr-img { width: 200px; height: 200px; margin: 16px auto; display: block; }
        .btn { display: inline-block; background: var(--primary); color: white; border-radius: 12px; padding: 12px 20px; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex items-center gap-3 mb-6">
            <a href="/permisionario/{{ permisionario.id }}/panel" class="text-2xl">←</a>
            <h1 class="text-xl font-bold">Código QR</h1>
        </div>

        <p class="text-sm text-muted mb-4" style="color:var(--text-muted)">Imprimí este QR para colocarlo en tu cuadra. Los conductores lo escanean para registrar entrada y salida.</p>

        <div class="card">
            <p class="font-semibold" style="font-size:18px;margin-bottom:4px">{{ permisionario.nombre }}</p>
            <p style="font-size:14px;color:var(--text-muted);margin-bottom:8px">{{ permisionario.calle }}</p>
            <img src="data:image/png;base64,{{ qr_b64 }}" class="qr-img" alt="QR de estacionamiento">
            <p style="font-size:13px;color:var(--text-muted)">Escaneá para estacionar en esta cuadra</p>
        </div>

        <div style="margin-top:24px">
            <a href="/permisionario/{{ permisionario.id }}/panel" class="btn">Volver al panel</a>
        </div>
    </div>
</body>
</html>
