<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historial — Permisionario</title>
    <meta name="theme-color" content="#015cb4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --nav-height: 64px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + 24px);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }

        .header { margin-bottom: 16px; }
        .header h1 { font-size: 20px; font-weight: 700; }

        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-box .value { font-size: 24px; font-weight: 700; }
        .stat-box .value.blue { color: var(--primary); }
        .stat-box .value.green { color: var(--success); }
        .stat-box .label { font-size: 11px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .session-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: var(--shadow);
        }
        .session-row .left { flex: 1; min-width: 0; }
        .session-row .location { font-weight: 600; font-size: 14px; }
        .session-row .meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .session-row .right { text-align: right; flex-shrink: 0; margin-left: 8px; }
        .session-row .amount { font-weight: 700; font-size: 15px; }
        .session-row .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .badge-paid { background: #dcfce7; color: var(--success); }
        .badge-unpaid { background: #FEF2F2; color: var(--danger); }
        .badge-debt { background: #fef3c7; color: var(--warning); }

        .empty {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 14px;
            padding: 40px 20px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid var(--border);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 600;
            padding: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Historial de hoy</h1>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <p class="value blue" id="totalVehicles">—</p>
                <p class="label">Vehículos</p>
            </div>
            <div class="stat-box">
                <p class="value green" id="totalRecaudado">$—</p>
                <p class="label">Recaudado</p>
            </div>
        </div>

        <p class="section-title">Sesiones de hoy</p>
        <div id="historialList">
            <p class="empty">Cargando…</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/permisionario/panel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Panel
        </a>
        <a href="/permisionario/qr">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><polyline points="14 14 17 14 17 17 21 17 21 21 14 21"/></svg>
            Mis QR
        </a>
        <a href="/permisionario/cuadra">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Cuadra
        </a>
        <a href="/permisionario/ingreso">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ingreso
        </a>
        <a href="/permisionario/salida">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salida
        </a>
    </nav>

    <script>
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'permisionario') {
            window.location.href = '/permisionario';
        }

        const headers = { 'Authorization': 'Bearer ' + token };

        async function loadHistorial() {
            try {
                const res = await fetch('/api/permisionario/historial', { headers });
                if (!res.ok) { window.location.href = '/permisionario'; return; }
                const historial = await res.json();

                const total = historial.length;
                const recaudado = historial.filter(h => h.pagado).reduce((s, h) => s + (h.costo_total || 0), 0);
                document.getElementById('totalVehicles').textContent = total;
                document.getElementById('totalRecaudado').textContent = '$' + Math.round(recaudado);

                const list = document.getElementById('historialList');
                if (!historial.length) {
                    list.innerHTML = '<p class="empty">Sin sesiones hoy</p>';
                    return;
                }

                list.innerHTML = historial.map(s => {
                    const inicio = new Date(s.hora_inicio);
                    const fin = s.hora_fin ? new Date(s.hora_fin) : null;
                    const horaInicio = inicio.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
                    const horaFin = fin ? fin.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' }) : '—';
                    const metodo = s.metodo_pago === 'efectivo' ? 'Efectivo' : s.metodo_pago === 'mercadopago' ? 'MP' : '—';

                    let badgeClass = 'badge-unpaid';
                    let badgeText = 'Pendiente';
                    if (s.estado === 'finalizada' && s.pagado) { badgeClass = 'badge-paid'; badgeText = 'Pagado'; }
                    else if (s.estado === 'deuda') { badgeClass = 'badge-debt'; badgeText = 'Deuda'; }
                    else if (s.estado === 'activa') { badgeClass = 'badge-unpaid'; badgeText = 'En curso'; }

                    return `
                        <div class="session-row">
                            <div class="left">
                                <p class="location">${s.ubicacion || 'Espacio #' + s.espacio_id}</p>
                                <p class="meta">${s.patente || '—'} · ${horaInicio} → ${horaFin} · ${metodo}</p>
                            </div>
                            <div class="right">
                                <p class="amount">$${Math.round(s.costo_total || 0)}</p>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('historialList').innerHTML = '<p class="empty">Error al cargar</p>';
            }
        }

        loadHistorial();
        setInterval(loadHistorial, 60000);
    </script>
</body>
</html>
