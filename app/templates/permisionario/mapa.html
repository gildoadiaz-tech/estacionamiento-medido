<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa - Permisionario</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #mapa { height: 60vh; width: 100%; border-radius: 1rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-lg mx-auto p-3">
        <div class="flex items-center gap-2 mb-3">
            <a href="/permisionario/{{ perm_id }}/panel" class="text-xl">←</a>
            <h1 class="text-lg font-bold">Mapa - Mis Espacios</h1>
        </div>

        <div id="mapa"></div>

        <div class="mt-3 bg-white rounded-xl p-3 border border-gray-200">
            <p class="text-xs text-gray-500 font-semibold uppercase mb-2">TUS ESPACIOS EN EL MAPA</p>
            <div id="listaEspacios" class="space-y-2 text-sm"></div>
        </div>
    </div>

    <script>
        const callesData = {{ calles_json|safe }};
        const misEspacios = {{ espacios_json|safe }};
        const sesionesActivas = {{ sesiones_json|safe }};

        const map = L.map('mapa').setView([-24.7883, -65.4106], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap', maxZoom: 19,
        }).addTo(map);

        callesData.forEach(c => {
            const style = c.tipo === 'estacionamiento_medido'
                ? { color: '#22c55e', weight: 5, opacity: 0.7 }
                : { color: '#ef4444', weight: 4, opacity: 0.6 };
            L.polyline(c.puntos, style).addTo(map);
        });

        const ocupados = new Set(sesionesActivas.filter(s => s.espacio_id).map(s => s.espacio_id));

        misEspacios.forEach(e => {
            if (!e.lat || !e.lng) return;
            const ocupado = ocupados.has(e.id);
            const color = ocupado ? '#ef4444' : '#22c55e';
            L.circleMarker([e.lat, e.lng], {
                radius: 8, color, fillColor: color, fillOpacity: 0.9, weight: 2,
            }).addTo(map)
                .bindPopup(`<b>${e.ubicacion}</b><br>$${e.precio_por_hora}/h · ${ocupado ? '🔴 Ocupado' : '🟢 Libre'}`);
        });

        const lista = document.getElementById('listaEspacios');
        lista.innerHTML = misEspacios.map(e => {
            const ocupado = ocupados.has(e.id);
            return `<div class="flex justify-between items-center py-1 border-b last:border-0">
                <span>${e.ubicacion}</span>
                <span class="text-xs px-2 py-1 rounded-full ${ocupado ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${ocupado ? 'Ocupado' : 'Libre'} · $${e.precio_por_hora}</span>
            </div>`;
        }).join('');
    </script>
</body>
</html>
