<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espacios — Permisionario</title>
    <meta name="theme-color" content="#015cb4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --nav-height: 64px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + 24px);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 420px; margin: 0 auto; padding: 16px; }

        .header { margin-bottom: 16px; }
        .header h1 { font-size: 20px; font-weight: 700; }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .filter-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            -webkit-appearance: none;
            transition: all 0.15s;
        }
        .filter-btn.active, .filter-btn:active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .filter-btn.libre { border-color: var(--success); color: var(--success); }
        .filter-btn.libre.active { background: var(--success); color: #fff; }
        .filter-btn.ocupado { border-color: var(--danger); color: var(--danger); }
        .filter-btn.ocupado.active { background: var(--danger); color: #fff; }

        .spaces-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .space-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .space-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .space-card.libre::before { background: var(--success); }
        .space-card.ocupado::before { background: var(--danger); }
        .space-card .space-num {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }
        .space-card .space-street {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .space-card .space-status {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .space-card.libre .space-status {
            background: #dcfce7;
            color: var(--success);
        }
        .space-card.ocupado .space-status {
            background: #FEF2F2;
            color: var(--danger);
        }
        .space-card .space-plate {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .empty {
            text-align: center;
            color: var(--text-tertiary);
            padding: 40px 20px;
            font-size: 14px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-top: 1px solid var(--border);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 600;
            padding: 6px;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav a.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Espacios</h1>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterSpaces('todos')">Todos</button>
            <button class="filter-btn libre" onclick="filterSpaces('libre')">Libres</button>
            <button class="filter-btn ocupado" onclick="filterSpaces('ocupado')">Ocupados</button>
        </div>

        <div id="spacesGrid" class="spaces-grid">
            <p class="empty">Cargando…</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/permisionario/panel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Panel
        </a>
        <a href="/permisionario/qr">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><polyline points="14 14 17 14 17 17 21 17 21 21 14 21"/></svg>
            Mis QR
        </a>
        <a href="/permisionario/cuadra">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Cuadra
        </a>
        <a href="/permisionario/ingreso">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ingreso
        </a>
        <a href="/permisionario/salida">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salida
        </a>
    </nav>

    <script>
        const token = localStorage.getItem('token');
        if (!token || localStorage.getItem('role') !== 'permisionario') {
            window.location.href = '/permisionario';
        }

        let allSpaces = [];
        let currentFilter = 'todos';

        async function loadSpaces() {
            try {
                const res = await fetch('/api/permisionario/espacios', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { window.location.href = '/permisionario'; return; }
                allSpaces = await res.json();
                renderSpaces();
            } catch (e) {
                document.getElementById('spacesGrid').innerHTML = '<p class="empty">Error al cargar</p>';
            }
        }

        function filterSpaces(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderSpaces();
        }

        function renderSpaces() {
            let filtered = allSpaces;
            if (currentFilter === 'libre') filtered = allSpaces.filter(e => e.disponible);
            if (currentFilter === 'ocupado') filtered = allSpaces.filter(e => !e.disponible);

            const grid = document.getElementById('spacesGrid');
            if (!filtered.length) {
                grid.innerHTML = '<p class="empty">No hay espacios</p>';
                return;
            }
            grid.innerHTML = filtered.map(e => {
                const status = e.disponible ? 'libre' : 'ocupado';
                const statusText = e.disponible ? 'Libre' : 'Ocupado';
                const plate = e.sesion_activa ? e.sesion_activa.patente : '';
                return `
                    <div class="space-card ${status}">
                        <p class="space-num">#${e.id}</p>
                        <p class="space-street">${e.ubicacion}</p>
                        <span class="space-status">${statusText}</span>
                        ${plate ? `<p class="space-plate">${plate}</p>` : ''}
                    </div>
                `;
            }).join('');
        }

        loadSpaces();
        setInterval(loadSpaces, 30000);
    </script>
</body>
</html>
