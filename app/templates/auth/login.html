<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión — Estacionamiento Salta</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            --uber-green: #06C167;
            --bg-primary: #000000;
            --bg-secondary: #1C1C1E;
            --bg-input: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #98989F;
            --text-tertiary: #636366;
            --border: #3A3A3C;
            --radius: 14px;
            --danger: #FF453A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 0 24px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: var(--uber-green);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
        }
        .logo-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .logo-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: none;
            letter-spacing: 0;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .form-input:focus {
            border-color: var(--uber-green);
        }
        .form-input::placeholder {
            color: var(--text-tertiary);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--uber-green);
            color: #000;
            border: none;
            border-radius: var(--radius);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            font-family: inherit;
            margin-top: 8px;
            -webkit-appearance: none;
        }
        .btn-login:active {
            opacity: 0.85;
            transform: scale(0.98);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: default;
        }
        .error-msg {
            text-align: center;
            font-size: 14px;
            color: var(--danger);
            margin-bottom: 12px;
            min-height: 20px;
        }
        .demo-section {
            margin-top: 32px;
            text-align: center;
        }
        .demo-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .demo-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .demo-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .demo-btn:active {
            background: #2C2C2E;
            border-color: var(--uber-green);
            color: var(--uber-green);
        }
        .demo-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">🅿️</div>
            <h1 class="logo-title">Estacionamiento</h1>
            <p class="logo-subtitle">Salta</p>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input type="text" id="username" class="form-input" placeholder="pedro, juan, admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" class="form-input" placeholder="••••" required autocomplete="current-password">
            </div>
            <button type="submit" id="btnLogin" class="btn-login">Ingresar</button>
        </form>

        <div class="demo-section">
            <p class="demo-label">Usuarios de prueba</p>
            <div class="demo-buttons">
                <button class="demo-btn fill-user" data-user="pedro">🚗 pedro</button>
                <button class="demo-btn fill-user" data-user="juan">🏪 juan</button>
                <button class="demo-btn fill-user" data-user="admin">⚙️ admin</button>
            </div>
            <p class="demo-hint">Contraseña: 1234 (admin: admin123)</p>
        </div>
    </div>

    <script>
        document.querySelectorAll('.fill-user').forEach(btn => {
            btn.addEventListener('click', () => {
                const u = btn.dataset.user;
                document.getElementById('username').value = u;
                document.getElementById('password').value = u === 'admin' ? 'admin123' : '1234';
                document.getElementById('loginForm').requestSubmit();
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = 'Ingresando…';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('user_nombre', data.nombre);
                    if (data.role === 'conductor') {
                        localStorage.setItem('conductor_id', data.user_id);
                        window.location.href = '/conductor';
                    } else if (data.role === 'permisionario') {
                        window.location.href = '/permisionario/' + data.user_id + '/panel';
                    } else {
                        window.location.href = '/admin';
                    }
                } else {
                    document.getElementById('errorMsg').textContent = data.detail || 'Credenciales inválidas';
                    btn.disabled = false;
                    btn.textContent = 'Ingresar';
                }
            } catch {
                document.getElementById('errorMsg').textContent = 'Error de conexión';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
