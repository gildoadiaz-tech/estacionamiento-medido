<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión — Estacionamiento Salta</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#015cb4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #015cb4;
            --primary-dark: #014a94;
            --primary-light: #e7f1ff;
            --accent: #ec0f7f;
            --accent-light: #fce7f3;
            --bg-primary: #f5f7fa;
            --bg-card: #ffffff;
            --bg-elevated: #eef2f7;
            --text-primary: #1a1a2e;
            --text-secondary: #455a72;
            --text-tertiary: #686868;
            --border: #e0e5ec;
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Manrope', 'Montserrat', system-ui, sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 100%;
            max-width: 360px;
            padding: 0 24px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: #fff;
            font-weight: 700;
        }
        .logo-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .form-input:focus { border-color: var(--primary); }
        .form-input::placeholder { color: var(--text-tertiary); }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            font-family: inherit;
            margin-top: 8px;
            -webkit-appearance: none;
        }
        .btn-login:active { opacity: 0.85; transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.5; cursor: default; transform: none; }
        .error-msg {
            text-align: center;
            font-size: 14px;
            color: var(--danger);
            margin-bottom: 12px;
            min-height: 20px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .register-link a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
        }
        .demo-section {
            margin-top: 24px;
            text-align: center;
        }
        .demo-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .demo-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .demo-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            -webkit-appearance: none;
        }
        .demo-btn:active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .demo-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">P</div>
            <h1 class="logo-title">Estacionamiento</h1>
            <p class="logo-subtitle">Municipalidad de Salta</p>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <div class="card">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">DNI o Usuario</label>
                    <input type="text" id="username" class="form-input" placeholder="DNI o nombre de usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-input" placeholder="Tu contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" id="btnLogin" class="btn-login">Ingresar</button>
            </form>
        </div>

        <div class="register-link">
            ¿No tenés cuenta? <a href="/registro">Registrate</a>
        </div>

        <div class="demo-section">
            <p class="demo-label">Usuarios de prueba</p>
            <div class="demo-buttons">
                <button class="demo-btn fill-user" data-user="pedro">pedro</button>
                <button class="demo-btn fill-user" data-user="juan">juan</button>
                <button class="demo-btn fill-user" data-user="admin">admin</button>
            </div>
            <p class="demo-hint">Contraseña: 1234 (admin: admin123)</p>
        </div>
    </div>

    <script>
        document.querySelectorAll('.fill-user').forEach(btn => {
            btn.addEventListener('click', () => {
                const u = btn.dataset.user;
                document.getElementById('username').value = u;
                document.getElementById('password').value = u === 'admin' ? 'admin123' : '1234';
                document.getElementById('loginForm').requestSubmit();
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('conductor_id', data.user_id);
                    localStorage.setItem('user_nombre', data.nombre);
                    if (data.role === 'conductor') {
                        window.location.href = '/conductor';
                    } else if (data.role === 'permisionario') {
                        window.location.href = '/permisionario/panel';
                    } else if (data.role === 'gestor') {
                        window.location.href = '/gestor';
                    } else if (data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/conductor';
                    }
                } else {
                    document.getElementById('errorMsg').textContent = data.detail || 'Credenciales inválidas';
                    btn.disabled = false;
                    btn.textContent = 'Ingresar';
                }
            } catch {
                document.getElementById('errorMsg').textContent = 'Error de conexión';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
    <script>navigator.serviceWorker&&navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
