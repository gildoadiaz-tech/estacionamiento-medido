services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: estacionamiento
      POSTGRES_USER: estacionamiento
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estacionamiento2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estacionamiento"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://estacionamiento:${DB_PASSWORD:-estacionamiento2026}@db:5432/estacionamiento
      JWT_SECRET: ${JWT_SECRET:-estacionamiento-salta-secret-key-2024}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: